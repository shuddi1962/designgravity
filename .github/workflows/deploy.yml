name: Deploy to Insforge.dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run typecheck || true
      
      - name: Build
        run: npm run build || true
      
      - name: Run validation
        run: npx ts-node scripts/validate-safe-delete.ts || true
      
      - name: Deploy to Insforge.dev
        if: success()
        run: |
          echo "Deployment would be triggered here"
          echo "Using INSFORGE_DEPLOY_TOKEN secret"

env:
  NODE_ENV: production